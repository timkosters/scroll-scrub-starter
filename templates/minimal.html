<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>{{NAME}}</title>
<meta name="description" content="{{DESCRIPTION}}" />

<meta property="og:title" content="{{NAME}}" />
<meta property="og:description" content="{{DESCRIPTION}}" />
<meta property="og:image" content="{{OG_IMAGE}}" />
<meta property="og:type" content="website" />
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="{{NAME}}" />
<meta name="twitter:description" content="{{DESCRIPTION}}" />
<meta name="twitter:image" content="{{OG_IMAGE}}" />

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: #ffffff;
    color: #111;
    font-family: -apple-system, BlinkMacSystemFont, "Inter", sans-serif;
    overscroll-behavior: none;
  }
  body { {{BG_STYLE}} }
  .stage {
    position: sticky;
    top: 0;
    height: 100vh;
    width: 100vw;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .canvas-wrap {
    position: relative;
    {{WRAP_CSS}}
    background: transparent;
    overflow: hidden;
  }
  canvas { display: block; width: 100%; height: 100%; }
  .spacer { height: 500vh; }
  .loader {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.88);
    color: #fff;
    pointer-events: none;
    transition: opacity 300ms ease;
  }
  .loader.hidden { opacity: 0; }
  .loader-label {
    font-size: 10px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.6);
  }
  .loader-pct {
    margin-top: 8px;
    font-size: 28px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }
  .hint {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 10px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: rgba(0, 0, 0, 0.5);
    pointer-events: none;
    transition: opacity 600ms ease;
    z-index: 10;
  }
  .hint.hidden { opacity: 0; }

  .poster-fallback { display: none; }
  @media (prefers-reduced-motion: reduce) {
    .stage { position: relative; height: auto; }
    .spacer { display: none; }
    .hint { display: none; }
    canvas, .loader { display: none; }
    .poster-fallback { display: block; width: 100%; height: 100%; }
    .poster-fallback img { display: block; width: 100%; height: 100%; object-fit: cover; }
  }
  @media (max-width: 640px) {
    .canvas-wrap { width: 92vw !important; max-width: 92vw !important; }
  }
</style>
</head>
<body>
  <div class="stage">
    <div class="canvas-wrap">
      <canvas id="canvas" role="img" aria-label="{{DESCRIPTION}}"></canvas>
      <div class="poster-fallback">
        <img src="./og-image.jpg" alt="{{DESCRIPTION}}" />
      </div>
      <div class="loader" id="loader">
        <div style="text-align:center;">
          <div class="loader-label">Loading</div>
          <div class="loader-pct" id="loaderPct">0%</div>
        </div>
      </div>
    </div>
  </div>
  <div class="spacer" aria-hidden="true"></div>
  <div class="hint" id="hint">Scroll</div>

<script>
(() => {
  if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
    return;
  }

  const FRAME_COUNT = {{FRAME_COUNT}};
  const FRAME_PAD = 4;
  const FRAME_EXT = "{{FRAME_EXT}}";
  const FRAME_PATH = (i) => `./frames/f_${String(i + 1).padStart(FRAME_PAD, '0')}.${FRAME_EXT}`;
  const CONCURRENCY = 6;

  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const loader = document.getElementById('loader');
  const loaderPct = document.getElementById('loaderPct');
  const hint = document.getElementById('hint');

  const frames = new Array(FRAME_COUNT);
  let loadedCount = 0;
  let currentFrame = 0;
  let rafScheduled = false;

  function drawFrame(index) {
    const img = frames[index];
    if (!img || !img.complete || img.naturalWidth === 0) return;
    const cw = canvas.width;
    const ch = canvas.height;
    const ir = img.naturalWidth / img.naturalHeight;
    const cr = cw / ch;
    let dw = cw, dh = ch, dx = 0, dy = 0;
    if (ir > cr) { dh = ch; dw = ch * ir; dx = (cw - dw) / 2; }
    else { dw = cw; dh = cw / ir; dy = (ch - dh) / 2; }
    ctx.clearRect(0, 0, cw, ch);
    ctx.drawImage(img, dx, dy, dw, dh);
  }

  function resize() {
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    const rect = canvas.getBoundingClientRect();
    canvas.width = Math.max(1, Math.round(rect.width * dpr));
    canvas.height = Math.max(1, Math.round(rect.height * dpr));
    drawFrame(currentFrame);
  }

  function onScroll() {
    if (rafScheduled) return;
    rafScheduled = true;
    requestAnimationFrame(() => {
      rafScheduled = false;
      const max = document.documentElement.scrollHeight - window.innerHeight;
      const progress = max > 0 ? Math.min(1, Math.max(0, window.scrollY / max)) : 0;
      const index = Math.min(FRAME_COUNT - 1, Math.floor(progress * (FRAME_COUNT - 1)));
      if (index !== currentFrame) {
        currentFrame = index;
        drawFrame(index);
        if (index > 2) hint.classList.add('hidden');
      }
    });
  }

  function loadOne(i) {
    return new Promise((resolve) => {
      const img = new Image();
      frames[i] = img;
      const done = () => {
        loadedCount += 1;
        loaderPct.textContent = Math.round((loadedCount / FRAME_COUNT) * 100) + '%';
        if (i === 0) drawFrame(0);
        if (loadedCount === FRAME_COUNT) {
          loader.classList.add('hidden');
          setTimeout(() => { loader.style.display = 'none'; }, 400);
        }
        resolve();
      };
      img.onload = done;
      img.onerror = done;
      img.src = FRAME_PATH(i);
    });
  }

  async function preload() {
    let next = 1;
    await loadOne(0);
    const workers = [];
    for (let w = 0; w < CONCURRENCY; w++) {
      workers.push((async () => {
        while (true) {
          const i = next++;
          if (i >= FRAME_COUNT) return;
          await loadOne(i);
        }
      })());
    }
    await Promise.all(workers);
  }

  resize();
  window.addEventListener('resize', resize);
  window.addEventListener('scroll', onScroll, { passive: true });
  preload();
})();
</script>
</body>
</html>
